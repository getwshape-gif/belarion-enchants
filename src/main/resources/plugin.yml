name: BelarionEnchants
version: 0.2.0
main: fr.belarion.enchants.BelarionEnchants
author: Belarion
description: Table d'enchantement et Enclume en Emeraude pour Belarion (1.8.8).

commands:
  enchanttable:
    description: Donne le bloc de la Table d'Enchantement (bloc d'emeraude).
    usage: /enchanttable
    permission: belarionenchants.admin
  enchantanvil:
    description: Donne le bloc de l'Enclume en Emeraude (sea lantern).
    usage: /enchantanvil
    permission: belarionenchants.admin
  emeralditem:
    description: Donne un item emeraude custom (sword, hammer).
    usage: /emeralditem <sword|hammer>
    permission: belarionenchants.admin

permissions:
  belarionenchants.admin:
    description: Acces aux commandes admin de BelarionEnchants
    default: op
