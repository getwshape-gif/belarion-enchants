name: BelarionEnchants
version: 1.0.0
main: fr.belarion.enchants.BelarionEnchants
author: Belarion
description: Systeme complet de Table d'Enchantement Emeraude et d'Enclume Emeraude (Paper/Spigot 1.8.8).

commands:
  enchanttable:
    description: Donne le bloc de l'Emerald Enchanting Table.
    usage: /enchanttable
    permission: belarionenchants.admin
  enchantanvil:
    description: Donne le bloc de l'Emerald Anvil.
    usage: /enchantanvil
    permission: belarionenchants.admin
  emeralditem:
    description: Donne un item emeraude custom.
    usage: /emeralditem <sword|hammer|boots>
    permission: belarionenchants.admin
  belarionenchants:
    description: Commande principale du plugin (reload, etc).
    usage: /belarionenchants <reload>
    permission: belarionenchants.admin
    aliases: [bel, benchants]

permissions:
  belarionenchants.admin:
    description: Acces aux commandes admin de BelarionEnchants
    default: op
