name: Compiler le plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Compiler avec Maven
        run: mvn -B package

      - name: Mettre le .jar en téléchargement
        uses: actions/upload-artifact@v4
        with:
          name: BelarionEnchants-jar
          path: target/BelarionEnchants-0.1.0.jar
